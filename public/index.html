<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Frigo connecte - Back-office</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 1000px;
      margin: 20px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { color: #1a3a5c; }
    .card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #1a3a5c; color: white; }
    button {
      background: #2c5f8f;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background: #1a3a5c; }
    button.danger { background: #c65d1e; }
    input, select {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin: 5px;
    }
    #formulaire {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Back-office frigo connecte</h1>

  <div class="card">
    <h2>Produits en base</h2>
    <table id="tableProduits">
      <thead>
        <tr>
          <th>Nom</th>
          <th>Poids</th>
          <th>Tolerance</th>
          <th>Prix</th>
          <th>Actif</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Ajouter un produit</h2>
    <div id="formulaire">
      <input type="text" id="nom" placeholder="Nom du produit">
      <input type="text" id="categorie" placeholder="Categorie">
      <input type="number" id="poids_cible" placeholder="Poids cible (g)">
      <input type="number" id="tolerance" placeholder="Tolerance (g)">
      <input type="number" id="empilement_max" placeholder="Empilement max">
      <input type="number" step="0.01" id="prix" placeholder="Prix (EUR)">
      <input type="text" id="allergenes" placeholder="Allergenes">
      <button onclick="ajouterProduit()">Ajouter</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from
      "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc,
             deleteDoc, doc, onSnapshot } from
      "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    // Configuration Firebase (Theo)
    const firebaseConfig = {
      apiKey: "AIzaSyBkKHg8utP-dmP2h8ws64zOQe82Fhdf0Z0",
      authDomain: "back-frigo.firebaseapp.com",
      projectId: "back-frigo",
      storageBucket: "back-frigo.firebasestorage.app",
      messagingSenderId: "541077182352",
      appId: "1:541077182352:web:0289b3a3ac37497c044515"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Charger les produits en temps reel
    onSnapshot(collection(db, "produits"), (snapshot) => {
      const tbody = document.querySelector("#tableProduits tbody");
      tbody.innerHTML = "";
      snapshot.forEach((docItem) => {
        const p = docItem.data();
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${p.nom || ""}</td>
          <td>${p.poids_cible || ""} g</td>
          <td>+/- ${p.tolerance || ""} g</td>
          <td>${p.prix ? p.prix.toFixed(2) + " EUR" : ""}</td>
          <td>${p.actif ? "Oui" : "Non"}</td>
          <td><button class="danger" onclick="supprimer('${docItem.id}')">Supprimer</button></td>
        `;
        tbody.appendChild(tr);
      });
    });

    window.ajouterProduit = async () => {
      const nom = document.getElementById("nom").value;
      const categorie = document.getElementById("categorie").value;
      const poids_cible = parseFloat(document.getElementById("poids_cible").value);
      const tolerance = parseFloat(document.getElementById("tolerance").value);
      const empilement_max = parseInt(document.getElementById("empilement_max").value);
      const prix = parseFloat(document.getElementById("prix").value);
      const allergenes = document.getElementById("allergenes").value;

      if (!nom || !poids_cible || !prix) {
        alert("Nom, poids et prix sont obligatoires");
        return;
      }

      await addDoc(collection(db, "produits"), {
        nom, categorie, poids_cible, tolerance, empilement_max,
        prix, allergenes, actif: true, cree_le: new Date()
      });

      document.querySelectorAll("input").forEach(i => i.value = "");
      alert("Produit ajoute !");
    };

    window.supprimer = async (id) => {
      if (!confirm("Supprimer ce produit ?")) return;
      await deleteDoc(doc(db, "produits", id));
    };
  </script>
</body>
</html>
